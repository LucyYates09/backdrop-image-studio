<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="给截图和图片添加渐变背景、圆角与阴影，并按常用比例导出 PNG。" />
  <title>Backdrop — 图片背景工作台</title>
  <style>
    :root{--ink:#151720;--muted:#777b8c;--line:#e7e8ee;--blue:#5d6cff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#f6f7fa;color:var(--ink)}body{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}button,input{font:inherit}button{color:inherit}.topbar{height:72px;padding:0 32px;display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;letter-spacing:-.6px}.brandMark{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,#55c8ff,#6258ff);box-shadow:0 6px 14px #6674ff55}.tag{color:var(--muted);font-size:13px;padding-left:16px;border-left:1px solid var(--line)}.actions{margin-left:auto;display:flex;gap:8px}.exportButton{border:0;padding:12px 18px;border-radius:12px;background:#171923;color:#fff;font-weight:700;cursor:pointer;box-shadow:0 8px 22px #15172026}.exportButton.secondary{background:#fff;color:#30333e;border:1px solid var(--line);box-shadow:none}.exportButton:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}.workspace{min-height:calc(100vh - 72px);display:grid;grid-template-columns:330px minmax(0,1fr)}.panel{padding:26px 24px 40px;background:#fff;border-right:1px solid var(--line);overflow:auto}.section{padding-bottom:27px;margin-bottom:25px;border-bottom:1px solid var(--line)}.section:last-child{border:0}.sectionTitle{display:flex;gap:9px;align-items:center;font-weight:750;font-size:14px;margin-bottom:15px}.sectionTitle span{font-size:10px;color:#8b91a4;letter-spacing:1px}.dropzone{border:1.5px dashed #cdd0da;border-radius:15px;min-height:118px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:.2s;background:#fbfbfd;text-align:center;padding:12px}.dropzone.pasting{border-color:var(--blue);background:#f7f7ff;box-shadow:0 0 0 3px #5d6cff12}.dropzone strong{font-size:13px;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.dropzone small{font-size:10px;color:#a0a4b1;letter-spacing:.5px}.uploadIcon{width:32px;height:32px;border-radius:10px;color:var(--blue);background:#edefff;display:grid;place-items:center;font-weight:700;font-size:18px}.ratioGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.ratioGrid button{border:1px solid var(--line);border-radius:10px;background:#fff;height:66px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;font-size:10px;color:#737789}.ratioGrid button i{display:block;height:20px;max-width:29px;border:1.5px solid currentColor;border-radius:2px}.ratioGrid button.active{color:var(--blue);border-color:#7f89ff;background:#f4f5ff;box-shadow:0 0 0 1px #7f89ff inset}.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.swatches button,.colorPicker{aspect-ratio:1;border-radius:11px;border:2px solid #fff;box-shadow:0 0 0 1px #dfe1e8;cursor:pointer;position:relative}.swatches button.active{box-shadow:0 0 0 2px var(--blue),0 5px 12px #4d5cff2c}.colorPicker{display:grid;place-items:center;overflow:hidden}.colorPicker input{position:absolute;opacity:0;inset:0;width:100%;height:100%;cursor:pointer}.colorPicker span{color:#fff;font-size:18px;text-shadow:0 1px 3px #0004}.sliderRow{display:block;margin-top:18px}.sliderRow div{display:flex;justify-content:space-between;font-size:12px;color:#5d6170;margin-bottom:9px}.sliderRow b{font-size:11px;color:#898d9b;font-variant-numeric:tabular-nums}.sliderRow input{width:100%;height:4px;appearance:none;border-radius:10px;background:linear-gradient(to right,var(--blue) var(--progress),#e5e6ec var(--progress))}.sliderRow input::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;border:4px solid var(--blue);box-shadow:0 2px 6px #0002;cursor:pointer}.watermarkRow{display:flex;align-items:center;justify-content:space-between;gap:14px}.watermarkCopy{display:flex;flex-direction:column;gap:4px}.watermarkCopy strong{font-size:13px}.watermarkCopy small{font-size:10px;color:#9599a8}.switch{position:relative;width:42px;height:24px;flex:0 0 auto}.switch input{position:absolute;opacity:0}.switch span{display:block;width:100%;height:100%;border-radius:20px;background:#d8dae2;transition:.2s;cursor:pointer}.switch span:after{content:"";position:absolute;width:18px;height:18px;top:3px;left:3px;border-radius:50%;background:#fff;box-shadow:0 2px 5px #0002;transition:.2s}.switch input:checked+span{background:var(--blue)}.switch input:checked+span:after{transform:translateX(18px)}.watermarkText{width:100%;height:38px;margin-top:14px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:#fbfbfd;color:#30333e;font-size:12px;outline:none}.watermarkText:focus{border-color:#7f89ff;box-shadow:0 0 0 3px #5d6cff12}.watermarkColors{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}.watermarkColors label{position:relative}.watermarkColors input{position:absolute;opacity:0}.watermarkColors span{height:34px;border:1px solid var(--line);border-radius:9px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;color:#737789;cursor:pointer}.watermarkColors i{width:13px;height:13px;border-radius:50%;border:1px solid #d8dae2}.watermarkColors .black i{background:#151720}.watermarkColors .white i{background:#fff}.watermarkColors input:checked+span{border-color:#7f89ff;background:#f4f5ff;color:var(--blue);box-shadow:0 0 0 1px #7f89ff inset}.stageWrap{min-width:0;padding:28px 36px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,#fff 0,#f6f7fa 55%,#eef0f5 100%)}.stageMeta{width:min(100%,900px);display:flex;justify-content:space-between;color:#8b8f9d;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}.canvasShell{width:min(100%,900px);height:min(70vh,760px);display:flex;align-items:center;justify-content:center;position:relative}canvas{max-width:100%;max-height:100%;width:auto;height:auto;display:block;border-radius:16px;box-shadow:0 18px 50px #2d335a20}canvas.empty{opacity:.35}.emptyState{position:absolute;border:0;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-radius:20px;padding:28px 42px;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;box-shadow:0 18px 50px #27326022}.emptyState[hidden]{display:none}.emptyState span{width:42px;height:42px;border-radius:13px;background:#171923;color:#fff;display:grid;place-items:center;font-size:22px;margin-bottom:5px}.emptyState strong{font-size:16px}.emptyState small{color:#8d91a0}.privacy{color:#9a9eab;font-size:11px;margin:17px 0 0}@media(max-width:800px){.topbar{padding:0 18px}.tag{display:none}.actions .secondary{display:none}.workspace{grid-template-columns:1fr}.panel{border-right:0;border-bottom:1px solid var(--line)}.stageWrap{min-height:70vh;padding:24px 18px}}
    /* Keep the editor preview close to the top of the workspace. */
    .stageWrap{padding-top:18px;justify-content:flex-start}
    .canvasShell{height:calc(100vh - 130px);max-height:820px;min-height:520px}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brandMark">✦</span><span>Backdrop</span></div>
    <div class="tag">图片背景工作台</div>
    <div class="actions"><button id="download" class="exportButton secondary" disabled>下载 PNG</button><button id="copy" class="exportButton" disabled>复制画布　⌘C</button></div>
  </header>
  <main class="workspace">
    <aside class="panel">
      <section class="section">
        <div class="sectionTitle"><span>01</span> 画布比例</div>
        <div id="ratios" class="ratioGrid"></div>
      </section>
      <section class="section">
        <div class="sectionTitle"><span>02</span> 背景样式</div>
        <div id="swatches" class="swatches"></div>
      </section>
      <section class="section">
        <div class="sectionTitle"><span>03</span> 细节调整</div>
        <label class="sliderRow"><div><span>外边距</span><b id="paddingValue">10%</b></div><input id="padding" type="range" min="2" max="24" value="10" /></label>
        <label class="sliderRow"><div><span>圆角</span><b id="radiusValue">3%</b></div><input id="radius" type="range" min="0" max="10" value="3" /></label>
        <label class="sliderRow"><div><span>阴影</span><b id="shadowValue">36</b></div><input id="shadow" type="range" min="0" max="60" value="36" /></label>
      </section>
      <section class="section">
        <div class="sectionTitle"><span>04</span> 品牌水印</div>
        <div class="watermarkRow">
          <div class="watermarkCopy"><strong>Power by JobWizard.ai</strong><small>显示在画布右下角</small></div>
          <label class="switch"><input id="watermark" type="checkbox" /><span></span></label>
        </div>
        <input id="watermarkText" class="watermarkText" type="text" maxlength="80" value="Power by JobWizard.ai" aria-label="水印文字" />
        <div class="watermarkColors">
          <label class="auto"><input type="radio" name="watermarkColor" value="auto" checked /><span><i style="background:linear-gradient(135deg,#202330 50%,#fff 50%)"></i>自动</span></label>
          <label class="black"><input type="radio" name="watermarkColor" value="black" /><span><i></i>黑色</span></label>
          <label class="white"><input type="radio" name="watermarkColor" value="white" /><span><i></i>白色</span></label>
        </div>
      </section>
    </aside>
    <section class="stageWrap">
      <div class="stageMeta"><span>实时预览</span><span id="dimensions"></span></div>
      <div class="canvasShell">
        <canvas id="canvas" class="empty"></canvas>
        <div id="emptyState" class="emptyState"><span>⌘V</span><strong>粘贴图片开始制作</strong><small>复制图片后，在此页面按 Command / Ctrl + V</small></div>
      </div>
      <p class="privacy">🔒 所有处理均在你的浏览器本地完成</p>
    </section>
  </main>
  <script>
    const ratios=[{label:'3:4',w:3,h:4},{label:'2:3',w:2,h:3},{label:'1:1',w:1,h:1},{label:'4:3',w:4,h:3},{label:'3:2',w:3,h:2},{label:'16:9',w:16,h:9}];
    const backgrounds=[['极光蓝',['#bff3ff','#6487ff','#e8c8ff']],['海盐',['#d9f8ff','#c6d5ff','#f2ddff']],['日落',['#ffd6b8','#ff9bad','#b29bff']],['青柠',['#d9ffd0','#8fe8c4','#8ab8ff']],['午夜',['#0e1838','#243d89','#7c45a6']],['奶油',['#fff9ec','#f7e9d2']],['纯白',['#ffffff']],['石墨',['#171923']]];
    let ratio=ratios[0],background=backgrounds[0][1],image=null,fileName='image';
    const $=id=>document.getElementById(id),canvas=$('canvas'),ctx=canvas.getContext('2d');
    function cssBg(colors){return colors.length===1?colors[0]:`linear-gradient(135deg,${colors.join(',')})`}
    ratios.forEach((r,i)=>{const b=document.createElement('button');b.className=i===0?'active':'';b.innerHTML=`<i style="aspect-ratio:${r.w}/${r.h}"></i>${r.label}`;b.onclick=()=>{ratio=r;[...$('ratios').children].forEach(x=>x.classList.remove('active'));b.classList.add('active');draw()};$('ratios').appendChild(b)});
    backgrounds.forEach((item,i)=>{const b=document.createElement('button');b.title=item[0];b.setAttribute('aria-label',item[0]);b.style.background=cssBg(item[1]);b.className=i===0?'active':'';b.onclick=()=>{background=item[1];[...$('swatches').querySelectorAll('button')].forEach(x=>x.classList.remove('active'));b.classList.add('active');draw()};$('swatches').appendChild(b)});
    const color=document.createElement('label');color.className='colorPicker';color.style.background='#6f7cff';color.innerHTML='<input type="color" value="#6f7cff" aria-label="自定义纯色"><span>＋</span>';color.querySelector('input').oninput=e=>{background=[e.target.value];color.style.background=e.target.value;[...$('swatches').querySelectorAll('button')].forEach(x=>x.classList.remove('active'));draw()};$('swatches').appendChild(color);
    ['padding','radius','shadow'].forEach(id=>{$(id).oninput=e=>{$(id+'Value').textContent=e.target.value+(id==='shadow'?'':'%');setSlider(e.target);draw()};setSlider($(id))});
    function setSlider(el){el.style.setProperty('--progress',`${(el.value-el.min)/(el.max-el.min)*100}%`)}
    function size(){let long=1600;if(image){const pad=+$('padding').value/100,wide=ratio.w>=ratio.h,cw=wide?1:ratio.w/ratio.h,ch=wide?ratio.h/ratio.w:1,inset=Math.min(cw,ch)*pad,availableW=cw-inset*2,availableH=ch-inset*2;long=Math.min(6000,Math.ceil(Math.max(image.naturalWidth/availableW,image.naturalHeight/availableH)))}return ratio.w>=ratio.h?[long,Math.round(long*ratio.h/ratio.w)]:[Math.round(long*ratio.w/ratio.h),long]}
    function draw(){const [w,h]=size();canvas.width=w;canvas.height=h;$('dimensions').textContent=`${w} × ${h}px${Math.max(w,h)>=6000?' · 安全上限':''}`;const g=ctx.createLinearGradient(0,0,w,h);background.forEach((c,i)=>g.addColorStop(i/Math.max(background.length-1,1),c));ctx.fillStyle=background.length===1?background[0]:g;ctx.fillRect(0,0,w,h);if(!image)return;const shortSide=Math.min(w,h),p=shortSide*(+$('padding').value/100),watermarkOn=$('watermark').checked,fontSize=Math.max(18,Math.round(shortSide*.022)),watermarkInset=Math.round(shortSide*.035),maxW=w-p*2,maxH=h-p*2,scale=Math.min(1,maxW/image.naturalWidth,maxH/image.naturalHeight),iw=image.naturalWidth*scale,ih=image.naturalHeight*scale,x=(w-iw)/2,y=(h-ih)/2,r=Math.min(iw,ih)*(+$('radius').value/100),s=+$('shadow').value;ctx.save();ctx.shadowColor=`rgba(18,25,60,${Math.min(.42,s/150)})`;ctx.shadowBlur=s*1.5;ctx.shadowOffsetY=s*.55;roundRect(x,y,iw,ih,r);ctx.fillStyle='#fff';ctx.fill();ctx.restore();ctx.save();roundRect(x,y,iw,ih,r);ctx.clip();ctx.drawImage(image,x,y,iw,ih);ctx.restore();const watermarkText=$('watermarkText').value.trim();if(watermarkOn&&watermarkText){const color=document.querySelector('input[name="watermarkColor"]:checked').value;ctx.save();ctx.font=`600 ${fontSize}px Arial, sans-serif`;ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillStyle=watermarkFill(color);ctx.fillText(watermarkText,w-watermarkInset,h-watermarkInset);ctx.restore()}}
    function watermarkFill(choice){if(choice==='black')return'rgba(20,24,38,.56)';if(choice==='white')return'rgba(255,255,255,.72)';const hex=background[background.length-1],n=parseInt(hex.slice(1),16),r=n>>16,g=n>>8&255,b=n&255,l=(r*299+g*587+b*114)/1000;return l>170?'rgba(20,24,38,.54)':'rgba(255,255,255,.68)'}
    function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,Math.min(r,w/2,h/2))}
    function load(file){if(!file||!file.type.startsWith('image/'))return;const url=URL.createObjectURL(file),img=new Image();img.onload=()=>{image=img;fileName='backdrop';canvas.classList.remove('empty');$('emptyState').hidden=true;$('copy').disabled=false;$('download').disabled=false;draw();URL.revokeObjectURL(url)};img.src=url}
    document.addEventListener('paste',e=>{const file=[...e.clipboardData.items].find(item=>item.type.startsWith('image/'))?.getAsFile();if(file){e.preventDefault();load(file)}});$('watermark').onchange=draw;$('watermarkText').oninput=draw;document.querySelectorAll('input[name="watermarkColor"]').forEach(input=>input.onchange=draw);
    $('download').onclick=()=>{const a=document.createElement('a');a.download=`${fileName}-${ratio.label.replace(':','x')}.png`;a.href=canvas.toDataURL('image/png',1);a.click()};
    $('copy').onclick=async()=>{const button=$('copy'),original=button.textContent;try{const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);button.textContent='已复制 ✓'}catch(error){button.textContent='复制失败，请下载 PNG'}setTimeout(()=>button.textContent=original,1800)};draw();
  </script>
</body>
</html>
